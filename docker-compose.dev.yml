version: "3.9"

# Development overrides — use: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  wuzapi:
    ports:
      - "3100:3100"
